<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Tiffin Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid main-container" style="padding-top: 0; padding-bottom: 0;">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-box-seam-fill"></i> Tiffin Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="users.html">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders-history.html">Order History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">

        <div class="row gx-5">
            <!-- Left Column: Add User Form -->
            <div class="col-md-4 mb-4">
                <div class="premium-card p-4">
                    <h5 class="fw-bold mb-4 d-flex align-items-center gap-2">
                        <div class="bg-primary bg-opacity-10 p-2 rounded text-primary"><i
                                class="bi bi-person-plus-fill"></i></div>
                        Add New User
                    </h5>
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium w-100 text-secondary">Full Name
                                <input type="text" id="userName" class="form-control mt-1"
                                    placeholder="e.g. Rahul Sharma" required>
                            </label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium w-100 text-secondary">Phone Number
                                <input type="tel" id="userPhone" class="form-control mt-1" placeholder="e.g. 9876543210"
                                    required>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary-custom w-100"
                            style="background-color: var(--success-color); border-color: var(--success-color);">
                            <i class="bi bi-person-plus-fill me-1"></i> Add User
                        </button>
                    </form>
                </div>
            </div>

            <!-- Right Column: Users List -->
            <div class="col-md-8">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-1">Registered Users</h2>
                        <p class="text-secondary mb-0">View all existing users.</p>
                    </div>
                </div>

                <div class="premium-card p-0 mb-5">
                    <div class="table-responsive">
                        <table class="table table-premium mb-0">
                            <thead>
                                <tr>
                                    <th width="15%">User ID</th>
                                    <th width="45%">Name</th>
                                    <th width="40%">Phone</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- Rows injected by JS -->
                                <tr>
                                    <td colspan="3" class="text-center text-muted py-4">Loading users...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
