<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Tiffin Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid main-container" style="padding-top: 0; padding-bottom: 0;">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-box-seam-fill"></i> Tiffin Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders-history.html">Order History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <div>
                <h2 class="fw-bold mb-1">Create New Order</h2>
                <p class="text-secondary mb-0">Select a user, add menu items to cart, and place order.</p>
            </div>
        </div>

        <form id="orderForm">
            <div class="row gx-5">

                <!-- Left Column: User & Menu Selection -->
                <div class="col-md-7 mb-4">

                    <!-- Search/Select User -->
                    <div class="card border-0 shadow-sm rounded-4 mb-4 p-3">
                        <div class="card-body">
                            <h5 class="fw-bold mb-3"><i class="bi bi-person-circle text-primary me-2"></i>1. Select
                                Customer</h5>
                            <select id="orderUserSelect" class="form-select form-select-lg shadow-none" required>
                                <option value="" disabled selected>Loading users...</option>
                            </select>
                        </div>
                    </div>

                    <!-- Menu Selection -->
                    <div class="card border-0 shadow-sm rounded-4 p-3">
                        <div class="card-body">
                            <h5 class="fw-bold mb-4"><i class="bi bi-card-checklist text-primary me-2"></i>2. Add Menu
                                Items</h5>

                            <!-- Menu List Container dynamically populated -->
                            <div id="orderMenuContainer" class="pe-2" style="max-height: 400px; overflow-y: auto;">
                                <div class="text-center text-muted py-4">Loading menu items...</div>
                            </div>

                        </div>
                    </div>

                </div>

                <!-- Right Column: Cart -->
                <div class="col-md-5">

                    <div class="card border-0 shadow-sm rounded-4 p-3 sticky-top" style="top: 100px; z-index: 10;">
                        <div class="card-body d-flex flex-column h-100">
                            <h5 class="fw-bold mb-4"><i class="bi bi-cart3 text-warning me-2"></i>3. Order Cart</h5>

                            <div class="table-responsive flex-grow-1">
                                <table class="table table-borderless table-custom table-sm mb-0">
                                    <thead>
                                        <tr>
                                            <th>Item</th>
                                            <th>Price</th>
                                            <th>Qty</th>
                                            <th>Subtotal</th>
                                            <th></th>
                                        </tr>
                                    </thead>
                                    <tbody id="cartTableBody" class="border-top-0">
                                        <tr>
                                            <td colspan="5" class="text-center text-muted py-4">Cart is empty</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <hr class="my-4 text-muted">

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <h4 class="fw-bold mb-0">Total:</h4>
                                <h3 class="fw-bold text-success mb-0" id="cartTotal">₹0.00</h3>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary-custom btn-lg w-100 shadow-sm">
                                    <i class="bi bi-check-circle-fill me-2"></i> Place Order
                                </button>
                                <button type="button" class="btn btn-light" onclick="cancelOrder()">
                                    Clear Cart & Restart
                                </button>
                            </div>
                        </div>
                    </div>

                </div>

            </div>
        </form>

    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
