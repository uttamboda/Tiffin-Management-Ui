<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Order - Tiffin Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid main-container" style="padding-top: 0; padding-bottom: 0;">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-box-seam-fill"></i> Tiffin Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders-history.html">Order History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">

        <div class="d-flex justify-content-between align-items-center mb-4 mt-2">
            <div>
                <h2 class="fw-bold mb-1">Create New Order</h2>
                <p class="text-secondary mb-0">Select a user, add menu items to cart, and place order.</p>
            </div>
        </div>

        <form id="orderForm">
            <!-- Top Section: User and Date Selection -->
            <div class="row mb-4">
                <div class="col-md-6 mb-3 mb-md-0">
                    <!-- Search/Select User -->
                    <div class="premium-card p-4 h-100">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-primary bg-opacity-10 p-2 rounded text-primary me-3"><i
                                    class="bi bi-person-heart fs-5"></i></div>
                            <h5 class="fw-bold mb-0">1. Select Customer</h5>
                        </div>
                        <select id="orderUserSelect" class="form-select form-select-lg shadow-sm" required>
                            <option value="" disabled selected>Loading users...</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <!-- Select Order Date -->
                    <div class="premium-card p-4 h-100">
                        <div class="d-flex align-items-center mb-3">
                            <div class="bg-info bg-opacity-10 p-2 rounded text-info me-3"><i
                                    class="bi bi-calendar-event fs-5"></i></div>
                            <h5 class="fw-bold mb-0">Select Order Date</h5>
                        </div>
                        <input type="date" class="form-control form-control-lg shadow-sm" id="orderDate"
                            name="orderDate">
                    </div>
                </div>
            </div>

            <!-- Two-column layout for Menu and Cart -->
            <div class="row gx-5">
                <!-- Left Column: Menu Selection -->
                <div class="col-md-6 mb-4">
                    <div class="premium-card p-4 h-100">
                        <div class="d-flex align-items-center mb-4">
                            <div class="bg-success bg-opacity-10 p-2 rounded text-success me-3"><i
                                    class="bi bi-card-checklist fs-5"></i></div>
                            <h5 class="fw-bold mb-0">2. Add Menu Items</h5>
                        </div>

                        <!-- Menu List Container dynamically populated -->
                        <div id="orderMenuContainer" class="pe-2"
                            style="max-height: 500px; overflow-y: auto; overflow-x: hidden;">
                            <div class="text-center text-muted py-4">Loading menu items...</div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Cart -->
                <div class="col-md-6 mb-4">
                    <div class="premium-card p-4 sticky-top h-100" style="top: 100px; z-index: 10;">
                        <div class="d-flex flex-column h-100">
                            <div class="d-flex align-items-center border-bottom pb-3 mb-4">
                                <div class="bg-warning bg-opacity-10 p-2 rounded text-warning me-3"><i
                                        class="bi bi-cart3 fs-5"></i></div>
                                <h5 class="fw-bold mb-0">3. Order Cart</h5>
                            </div>

                            <div class="table-responsive flex-grow-1" style="max-height: 350px; overflow-y: auto;">
                                <table class="table table-borderless align-middle mb-0">
                                    <thead class="text-muted small text-uppercase"
                                        style="letter-spacing: 0.5px; border-bottom: 2px solid var(--border-color); position: sticky; top: 0; background: white; z-index: 1;">
                                        <tr>
                                            <th class="ps-0">Item</th>
                                            <th>Price</th>
                                            <th class="text-center" style="width: 80px;">Qty</th>
                                            <th class="text-end">Subtotal</th>
                                            <th class="pe-0"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="cartTableBody">
                                        <tr>
                                            <td colspan="5" class="text-center text-muted py-5">
                                                <i class="bi bi-cart-x fs-1 opacity-25 d-block mb-3"></i>
                                                Cart is empty
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="mt-auto">
                                <hr class="my-4 text-muted">

                                <div class="d-flex justify-content-between align-items-center mb-4">
                                    <h4 class="fw-bold mb-0">Total:</h4>
                                    <h3 class="fw-bold text-success mb-0" id="cartTotal">₹0.00</h3>
                                </div>

                                <div class="d-grid gap-3">
                                    <button type="submit"
                                        class="btn btn-primary-custom btn-lg w-100 shadow-sm py-3 fs-5">
                                        <i class="bi bi-check2-circle me-2"></i> Place Order
                                    </button>
                                    <button type="button" class="btn btn-light text-danger fw-medium"
                                        onclick="cancelOrder()">
                                        <i class="bi bi-trash"></i> Cancel Order
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>

    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/app.js"></script>
</body>

</html>
