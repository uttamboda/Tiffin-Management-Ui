<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Menu - Tiffin Management</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
        <div class="container-fluid main-container" style="padding-top: 0; padding-bottom: 0;">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <i class="bi bi-box-seam-fill"></i> Tiffin Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active fw-medium" href="menu.html">Menu</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="users.html">Users</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders.html">Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="orders-history.html">Order History</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-1">Manage Menu</h2>
                <p class="text-secondary mb-0">Add, view, update, and delete tiffin menu items.</p>
            </div>
            <!-- Add Button triggers Modal -->
            <button class="btn btn-primary-custom" data-bs-toggle="modal" data-bs-target="#addMenuModal">
                <i class="bi bi-plus-lg"></i> Add New Dish
            </button>
        </div>

        <!-- Menu Table -->
        <div class="table-responsive">
            <table class="table table-custom">
                <thead>
                    <tr>
                        <th width="10%">ID</th>
                        <th width="40%">Dish Name</th>
                        <th width="25%">Price</th>
                        <th width="25%">Actions</th>
                    </tr>
                </thead>
                <tbody id="menuTableBody">
                    <!-- Rows injected by JS -->
                    <tr>
                        <td colspan="4" class="text-center text-muted">Loading menu items...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- Add Menu Modal -->
    <div class="modal fade" id="addMenuModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Add New Dish</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addMenuForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium w-100">Dish Name
                                <input type="text" id="dishName" class="form-control mt-1"
                                    placeholder="e.g. Paneer Butter Masala" required>
                            </label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium w-100">Price (₹)
                                <input type="number" id="price" class="form-control mt-1" placeholder="0.00" step="0.01"
                                    required>
                            </label>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom px-4">Add Dish</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Menu Modal -->
    <div class="modal fade" id="editMenuModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold">Edit Dish</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editMenuForm">
                        <input type="hidden" id="editMenuId">
                        <div class="mb-3">
                            <label class="form-label fw-medium w-100">Dish Name
                                <input type="text" id="editDishName" class="form-control mt-1" required>
                            </label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-medium w-100">Price (₹)
                                <input type="number" id="editPrice" class="form-control mt-1" step="0.01" required>
                            </label>
                        </div>
                        <div class="d-flex gap-2 justify-content-end">
                            <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom px-4">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
